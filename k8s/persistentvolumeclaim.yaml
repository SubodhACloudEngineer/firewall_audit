apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: firewall-audit-uploads
  namespace: firewall-audit
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: azurefile-csi
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: firewall-audit-reports
  namespace: firewall-audit
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: azurefile-csi
  resources:
    requests:
      storage: 10Gi
